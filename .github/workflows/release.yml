name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

env:
  REGISTRY: higress-registry.cn-hangzhou.cr.aliyuncs.com
  REPO: higress

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          body: |
            ## Docker Images

            Multi-architecture images (amd64 + arm64):

            ```bash
            # Manager
            docker pull ${{ env.REGISTRY }}/${{ env.REPO }}/hiclaw-manager:${{ github.ref_name }}

            # Worker
            docker pull ${{ env.REGISTRY }}/${{ env.REPO }}/hiclaw-worker:${{ github.ref_name }}
            ```

            ## Quick Start

            ### macOS / Linux

            ```bash
            bash <(curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install/hiclaw-install.sh)
            ```

            ### Windows (PowerShell 7+)

            ```powershell
            Set-ExecutionPolicy Bypass -Scope Process -Force; Invoke-Expression ((New-Object System.Net.WebClient).DownloadString('https://higress.ai/hiclaw/install.ps1'))
            ```

            ## Documentation

            For more details, see the [installation guide](https://github.com/${{ github.repository }}/blob/main/install/README.md).
